# CodeQL Security Analysis — COSC 6055 Week 11 Demo
# Scans the UqsBlog domain test build for C# security issues.
# Results appear in GitHub Security → Code scanning alerts.

name: CodeQL Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended
          build-mode: manual

      - name: Restore UqsBlog solution
        run: dotnet restore .github/src/UqsBlog/UqsBlog.sln

      - name: Build UqsBlog solution
        run: dotnet build .github/src/UqsBlog/UqsBlog.sln --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
